services:
  - type: web
    name: anclora-filestudio
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build && python3 -m pip install yt-dlp
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_NAME
        value: Anclora FileStudio
      - key: MEDIA_TEMP_DIR
        value: .tmp/media
    # Note: On Render, you can use a custom build script to install ffmpeg
    # or use a Docker-based deploy if needed. For the native Node env,
    # ffmpeg is often pre-installed or available via environment packages.
