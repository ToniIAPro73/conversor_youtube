name: Portable Acceptance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/acceptance/**"
      - "scripts/build-*-portable.sh"
      - "scripts/windows-portable/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  linux-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:acceptance:fixtures

  windows-fixtures:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:acceptance:fixtures
