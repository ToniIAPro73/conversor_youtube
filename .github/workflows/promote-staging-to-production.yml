name: Promote staging to production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.2.0)"
        required: false

permissions:
  contents: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Merge staging into production
        run: |
          git checkout production
          git merge --no-ff origin/staging -m "chore: merge staging to production [ci-skip]"
          git push origin production

      - name: Create version tag
        if: ${{ inputs.version != '' }}
        run: |
          git tag "${{ inputs.version }}" production
          git push origin "${{ inputs.version }}"

